<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ultima-DL — High-performance YouTube video and audio downloader with 4K support.">
    <title>Ultima-DL — YouTube Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <h1>Ultima<span>-DL</span></h1>
            </div>
            <p class="tagline">High-Performance YouTube Downloader</p>
        </header>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="mode-video" onclick="setMode('video')">🎬 Single Video</button>
            <button class="mode-btn" id="mode-playlist" onclick="setMode('playlist')">📋 Playlist</button>
        </div>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-wrapper" id="input-wrapper">
                <input type="text" id="url-input" placeholder="Paste a YouTube link here..." autocomplete="off" spellcheck="false">
                <button class="fetch-btn" id="fetch-btn" onclick="handleFetch()">
                    <span id="fetch-btn-text">Fetch</span>
                    <div class="btn-spinner" id="fetch-spinner" style="display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;"></div>
                </button>
            </div>
            <div class="error-message" id="error-message">
                <span>⚠️</span>
                <span id="error-text"></span>
            </div>
        </section>

        <!-- Loading -->
        <section class="loading-section" id="loading-section">
            <div class="spinner-container">
                <div class="spinner"></div>
                <p class="loading-text" id="loading-text">Fetching video info<span class="loading-dots"></span></p>
            </div>
        </section>

        <!-- ===== SINGLE VIDEO ===== -->
        <section class="preview-card" id="preview-card">
            <div class="preview-thumbnail-wrapper">
                <img class="preview-thumbnail" id="preview-thumbnail" src="" alt="Video thumbnail">
                <span class="duration-badge" id="preview-duration"></span>
            </div>
            <div class="preview-info">
                <h2 class="preview-title" id="preview-title"></h2>
                <div class="preview-channel">
                    <span class="channel-dot"></span>
                    <span id="preview-channel"></span>
                </div>
            </div>
        </section>

        <section class="formats-section" id="formats-section">
            <div class="format-tabs">
                <button class="tab-btn active" data-tab="standard" onclick="switchTab('standard')">
                    <span class="tab-icon">🎬</span><span>Standard</span>
                    <span class="tab-count" id="count-standard">0</span>
                </button>
                <button class="tab-btn" data-tab="pro" onclick="switchTab('pro')">
                    <span class="tab-icon">⚡</span><span>Pro</span>
                    <span class="tab-count" id="count-pro">0</span>
                </button>
                <button class="tab-btn" data-tab="audio" onclick="switchTab('audio')">
                    <span class="tab-icon">🎵</span><span>Audio</span>
                    <span class="tab-count" id="count-audio">0</span>
                </button>
            </div>
            <div class="format-panel active" id="panel-standard"><div class="format-list" id="list-standard"></div></div>
            <div class="format-panel" id="panel-pro"><div class="format-list" id="list-pro"></div></div>
            <div class="format-panel" id="panel-audio"><div class="format-list" id="list-audio"></div></div>
        </section>

        <!-- ===== PLAYLIST ===== -->
        <section class="playlist-section" id="playlist-section" style="display:none;">
            <div class="playlist-header" id="playlist-header">
                <h2 class="playlist-title" id="playlist-title"></h2>
                <span class="playlist-count" id="playlist-count"></span>
            </div>

            <!-- Folder Path -->
            <div class="folder-input-section">
                <label class="folder-label">📁 Save to Folder</label>
                <div class="folder-input-row">
                    <div class="folder-input-wrapper">
                        <input type="text" id="folder-input" placeholder="e.g. D:\YouTube Downloads" spellcheck="false">
                    </div>
                    <button class="browse-btn" id="browse-btn" title="Opens a folder window on your PC" onclick="browseFolder()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        <span id="browse-text">Browse PC</span>
                        <div class="btn-spinner" id="browse-spinner" style="display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;"></div>
                    </button>
                </div>
            </div>

            <!-- Quality Selector -->
            <div class="quality-selector" id="quality-selector">
                <h3 class="quality-label">Select Quality</h3>
                <div class="quality-grid" id="quality-grid"></div>
            </div>

            <!-- Video List -->
            <div class="playlist-videos" id="playlist-videos"></div>

            <!-- Download All Button -->
            <div class="playlist-actions">
                <button class="download-all-btn" id="download-all-btn" onclick="downloadPlaylist()">
                    <span id="dl-all-text">⬇ Download All to Folder</span>
                    <div class="btn-spinner" id="dl-all-spinner" style="display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;"></div>
                </button>
            </div>

            <!-- Progress Section -->
            <div class="progress-section" id="progress-section" style="display:none;">
                <div class="progress-header">
                    <span class="progress-label" id="progress-label">Downloading...</span>
                    <span class="progress-count" id="progress-count">0 / 0</span>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
                </div>
                <p class="progress-current" id="progress-current"></p>
                <div class="progress-errors" id="progress-errors" style="display:none;"></div>
            </div>
        </section>

        <!-- Download Status -->
        <div class="download-status" id="download-status">
            <span id="download-status-text"></span>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Ultima-DL &mdash; Powered by <a href="https://github.com/yt-dlp/yt-dlp" target="_blank" rel="noopener">yt-dlp</a> &amp; FFmpeg</p>
        </footer>
    </div>

    <script>
        let currentUrl = '';
        let currentMode = 'video';
        let videoData = null;
        let playlistData = null;
        let selectedQuality = 'best';

        const urlInput       = document.getElementById('url-input');
        const inputWrapper   = document.getElementById('input-wrapper');
        const fetchBtn       = document.getElementById('fetch-btn');
        const fetchBtnText   = document.getElementById('fetch-btn-text');
        const fetchSpinner   = document.getElementById('fetch-spinner');
        const errorBox       = document.getElementById('error-message');
        const errorText      = document.getElementById('error-text');
        const loadingSection = document.getElementById('loading-section');
        const loadingTextEl  = document.getElementById('loading-text');
        const previewCard    = document.getElementById('preview-card');
        const formatsSection = document.getElementById('formats-section');
        const playlistSection = document.getElementById('playlist-section');
        const downloadStatus = document.getElementById('download-status');
        const downloadStatusText = document.getElementById('download-status-text');

        urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleFetch(); });
        urlInput.addEventListener('input', () => { hideError(); inputWrapper.classList.remove('shake', 'error-state'); });

        // ---- Mode Toggle ----
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-video').classList.toggle('active', mode === 'video');
            document.getElementById('mode-playlist').classList.toggle('active', mode === 'playlist');
            urlInput.placeholder = mode === 'video' ? 'Paste a YouTube video link here...' : 'Paste a YouTube playlist link here...';
            hideResults();
        }

        function handleFetch() {
            currentMode === 'video' ? fetchInfo() : fetchPlaylist();
        }

        // ---- Single Video ----
        async function fetchInfo() {
            const url = urlInput.value.trim();
            if (!url) { showError('Please paste a YouTube URL.'); shakeInput(); return; }
            currentUrl = url; hideError(); hideDownloadStatus(); setFetchLoading(true);
            showLoading('Fetching video info'); hideResults();
            try {
                const resp = await fetch('/extract', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Something went wrong.');
                videoData = data; renderPreview(data); renderFormats(data);
            } catch (err) { showError(err.message); shakeInput(); }
            finally { setFetchLoading(false); hideLoading(); }
        }

        function renderPreview(data) {
            document.getElementById('preview-thumbnail').src = data.thumbnail;
            document.getElementById('preview-title').textContent = data.title;
            document.getElementById('preview-channel').textContent = data.channel;
            document.getElementById('preview-duration').textContent = data.duration;
            previewCard.classList.add('visible');
        }

        function renderFormats(data) {
            renderFormatList('standard', data.standard, 'standard');
            renderFormatList('pro', data.pro, 'pro');
            renderFormatList('audio', data.audio, 'audio');
            document.getElementById('count-standard').textContent = data.standard.length;
            document.getElementById('count-pro').textContent = data.pro.length;
            document.getElementById('count-audio').textContent = data.audio.length;
            formatsSection.classList.add('visible');
            if (data.standard.length > 0) switchTab('standard');
            else if (data.pro.length > 0) switchTab('pro');
            else if (data.audio.length > 0) switchTab('audio');
        }

        function renderFormatList(type, formats, category) {
            const list = document.getElementById(`list-${type}`);
            list.innerHTML = '';
            if (!formats || formats.length === 0) {
                list.innerHTML = `<div class="no-formats"><div class="no-formats-icon">📭</div><p>No ${type === 'pro' ? 'high-res' : type} formats available</p></div>`;
                return;
            }
            formats.forEach(f => {
                const item = document.createElement('div');
                item.className = 'format-item';
                const quality = type === 'audio' ? f.quality : f.resolution;
                const ext = f.ext || '';
                const fpsText = f.fps ? `${f.fps}fps` : '';
                const sizeText = f.size || '';
                let badge = type === 'pro' ? '<span class="pro-badge">⚡ FFmpeg</span>' : '';
                item.innerHTML = `
                    <div class="format-info">
                        <span class="format-quality">${quality}</span>
                        <div class="format-meta">
                            <span class="format-tag tag-${ext.toLowerCase()}">${ext}</span>
                            ${fpsText ? `<span class="format-fps">${fpsText}</span>` : ''}
                            ${badge}
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;">
                        ${sizeText ? `<span class="format-size">${sizeText}</span>` : ''}
                        <button class="download-btn" onclick="downloadFile('${f.format_id}','${category}')" id="dl-btn-${f.format_id}">
                            <span class="btn-text">↓ Download</span><div class="btn-spinner"></div>
                        </button>
                    </div>`;
                list.appendChild(item);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            document.querySelectorAll('.format-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
        }

        async function downloadFile(formatId, category) {
            const btn = document.getElementById(`dl-btn-${formatId}`);
            if (!btn || btn.disabled) return;
            btn.disabled = true; btn.classList.add('loading');
            showDownloadStatus('⏳ Preparing your download...', '');
            try {
                const resp = await fetch('/download', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:currentUrl,format_id:formatId,category}) });
                if (!resp.ok) { const e = await resp.json(); throw new Error(e.error || 'Download failed.'); }
                const blob = await resp.blob();
                const cd = resp.headers.get('Content-Disposition');
                let filename = 'video.mp4';
                if (cd) { const m = cd.match(/filename\*?=(?:UTF-8''|"?)([^";]+)/i); if (m) filename = decodeURIComponent(m[1].replace(/"/g,'')); }
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
                showDownloadStatus('✅ Download started!', 'success'); setTimeout(hideDownloadStatus, 4000);
            } catch (err) { showDownloadStatus(`❌ ${err.message}`, 'error'); setTimeout(hideDownloadStatus, 6000); }
            finally { btn.disabled = false; btn.classList.remove('loading'); }
        }

        // ---- Playlist ----
        async function fetchPlaylist() {
            const url = urlInput.value.trim();
            if (!url) { showError('Please paste a YouTube playlist URL.'); shakeInput(); return; }
            currentUrl = url; hideError(); hideDownloadStatus(); setFetchLoading(true);
            showLoading('Fetching playlist info'); hideResults();
            try {
                const resp = await fetch('/extract_playlist', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Something went wrong.');
                playlistData = data; renderPlaylist(data);
            } catch (err) { showError(err.message); shakeInput(); }
            finally { setFetchLoading(false); hideLoading(); }
        }

        function renderPlaylist(data) {
            document.getElementById('playlist-title').textContent = data.playlist_title;
            document.getElementById('playlist-count').textContent = `${data.count} videos`;

            const grid = document.getElementById('quality-grid');
            grid.innerHTML = '';
            data.quality_presets.forEach(q => {
                const card = document.createElement('button');
                card.className = 'quality-card' + (q.id === 'best' ? ' selected' : '');
                card.dataset.quality = q.id;
                card.onclick = () => selectQuality(q.id);
                card.innerHTML = `<span class="quality-card-label">${q.label}</span><span class="quality-card-desc">${q.desc}</span>`;
                grid.appendChild(card);
            });

            const list = document.getElementById('playlist-videos');
            list.innerHTML = '';
            data.videos.forEach(v => {
                const item = document.createElement('div');
                item.className = 'playlist-video-item';
                item.innerHTML = `<span class="pv-index">${v.index}</span><div class="pv-info"><span class="pv-title">${v.title}</span><span class="pv-duration">${v.duration}</span></div>`;
                list.appendChild(item);
            });

            // Reset progress
            document.getElementById('progress-section').style.display = 'none';
            playlistSection.style.display = 'block';
            playlistSection.style.animation = 'fadeSlideUp 0.5s ease-out';
        }

        function selectQuality(quality) {
            selectedQuality = quality;
            document.querySelectorAll('.quality-card').forEach(c => c.classList.toggle('selected', c.dataset.quality === quality));
        }

        async function downloadPlaylist() {
            const folder = document.getElementById('folder-input').value.trim();
            if (!folder) {
                showError('Please enter a folder path to save the videos.');
                document.getElementById('folder-input').focus();
                return;
            }

            const btn = document.getElementById('download-all-btn');
            const btnText = document.getElementById('dl-all-text');
            const spinner = document.getElementById('dl-all-spinner');
            btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'inline-block';
            hideError();

            try {
                // Start the download
                const resp = await fetch('/download_playlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: currentUrl, quality: selectedQuality, folder: folder })
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Failed to start download.');

                // Show progress and listen to SSE
                const sessionId = data.session_id;
                showProgress();
                listenProgress(sessionId);

            } catch (err) {
                showError(err.message);
                btn.disabled = false; btnText.style.display = 'inline'; spinner.style.display = 'none';
            }
        }

        function showProgress() {
            const section = document.getElementById('progress-section');
            section.style.display = 'block';
            section.style.animation = 'fadeSlideUp 0.4s ease-out';
            document.getElementById('progress-bar-fill').style.width = '0%';
            document.getElementById('progress-label').textContent = 'Starting download...';
            document.getElementById('progress-count').textContent = '';
            document.getElementById('progress-current').textContent = '';
            document.getElementById('progress-errors').style.display = 'none';
        }

        function listenProgress(sessionId) {
            const source = new EventSource(`/playlist_progress/${sessionId}`);

            source.onmessage = (event) => {
                const d = JSON.parse(event.data);

                if (d.error && d.done) {
                    source.close();
                    resetDownloadBtn();
                    showError(d.error);
                    return;
                }

                // Update progress bar
                const pct = d.total > 0 ? Math.round((d.current / d.total) * 100) : 0;
                document.getElementById('progress-bar-fill').style.width = pct + '%';
                document.getElementById('progress-count').textContent = `${d.completed_count} / ${d.total}`;
                document.getElementById('progress-label').textContent = d.done ? '✅ Download Complete!' : `⏳ ${d.status}`;
                document.getElementById('progress-current').textContent = d.current_title ? `Currently: ${d.current_title}` : '';

                // Show errors if any
                if (d.error_count > 0) {
                    const errDiv = document.getElementById('progress-errors');
                    errDiv.style.display = 'block';
                    errDiv.innerHTML = `<small>⚠️ ${d.error_count} error(s): ${d.errors.join(', ')}</small>`;
                }

                if (d.done) {
                    source.close();
                    resetDownloadBtn();
                    document.getElementById('progress-bar-fill').style.width = '100%';
                    document.getElementById('progress-bar-fill').classList.add('complete');
                    if (d.save_dir) {
                        document.getElementById('progress-current').textContent = `✅ Saved to: ${d.save_dir}`;
                    }
                }
            };

            source.onerror = () => {
                source.close();
                resetDownloadBtn();
            };
        }

        function resetDownloadBtn() {
            const btn = document.getElementById('download-all-btn');
            const btnText = document.getElementById('dl-all-text');
            const spinner = document.getElementById('dl-all-spinner');
            btn.disabled = false; btnText.style.display = 'inline'; spinner.style.display = 'none';
        }

        // ---- Browse Folder ----
        async function browseFolder() {
            const btn = document.getElementById('browse-btn');
            const btnText = document.getElementById('browse-text');
            const spinner = document.getElementById('browse-spinner');
            btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'inline-block';
            try {
                const resp = await fetch('/browse_folder', { method: 'POST' });
                const data = await resp.json();
                if (data.folder) {
                    document.getElementById('folder-input').value = data.folder;
                }
            } catch (err) { console.error('Browse failed:', err); }
            finally { btn.disabled = false; btnText.style.display = 'inline'; spinner.style.display = 'none'; }
        }

        // ---- UI Helpers ----
        function showError(msg) { errorText.textContent = msg; errorBox.classList.add('visible'); }
        function hideError() { errorBox.classList.remove('visible'); }
        function shakeInput() { inputWrapper.classList.add('shake','error-state'); setTimeout(() => inputWrapper.classList.remove('shake'), 600); }
        function setFetchLoading(l) { fetchBtn.disabled=l; fetchBtnText.style.display=l?'none':'inline'; fetchSpinner.style.display=l?'inline-block':'none'; }
        function showLoading(t) { loadingTextEl.innerHTML = t + '<span class="loading-dots"></span>'; loadingSection.classList.add('visible'); }
        function hideLoading() { loadingSection.classList.remove('visible'); }
        function hideResults() { previewCard.classList.remove('visible'); formatsSection.classList.remove('visible'); playlistSection.style.display = 'none'; }
        function showDownloadStatus(t,type) { downloadStatusText.textContent=t; downloadStatus.className='download-status visible'+(type?` ${type}`:''); }
        function hideDownloadStatus() { downloadStatus.classList.remove('visible'); }
    </script>
</body>
</html>
